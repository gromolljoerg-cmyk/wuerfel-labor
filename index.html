<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINT Interaktives Würfel-Labor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1><span>🎲</span> Das Interaktive Würfel-Labor</h1>
            <p>Erforsche den Zufall: Vom echten Würfelwurf zur mathematischen Kurve</p>
        </header>
        
        <div class="mode-tabs">
            <button id="tabEinzel" class="tab-btn active">🎯 Modus 1: Einzelwurf</button>
            <button id="tabMassen" class="tab-btn">⚡ Modus 2: Live-Massensimulation</button>
        </div>

        <div class="main-layout">
            <div class="left-column">
                <section class="card controls-card">
                    <h2>Anpassung</h2>
                    
                    <div class="control-group">
                        <label for="wuerfelSeiten">Seiten pro Würfel:</label>
                        <select id="wuerfelSeiten">
                            <option value="4">4 Seiten (D4)</option>
                            <option value="6" selected>6 Seiten (Standard W6)</option>
                            <option value="8">8 Seiten (D8)</option>
                            <option value="12">12 Seiten (D12)</option>
                            <option value="20">20 Seiten (D20)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="wuerfelAnzahl">Anzahl der Würfel:</label>
                        <input type="number" id="wuerfelAnzahl" value="2" min="1" max="5">
                    </div>

                    <div id="massenInputGroup" class="control-group hidden">
                        <label for="wurfAnzahl">Anzahl der Würfe (max. 100.000):</label>
                        <input type="number" id="wurfAnzahl" value="2000" min="10" max="100000">
                    </div>

                    <div class="button-group">
                        <button id="actionBtn" class="btn-primary">Würfeln</button>
                        <button id="exportBtn" class="btn-export" disabled>Daten für Excel/CODAP exportieren (.csv)</button>
                        <button id="resetBtn" class="btn-danger">Statistik zurücksetzen</button>
                    </div>
                </section>

                <section id="visualCard" class="card visual-card">
                    <h2>Live-Wurf & Historie</h2>
                    <div id="diceContainer" class="dice-grid"></div>
                    <div id="wurfErgebnisText" class="result-text">Klicke auf "Würfeln"!</div>
                    
                    <div class="history-container">
                        <h3>Die letzten 3 Ergebnisse:</h3>
                        <ul id="historyList"></ul>
                    </div>
                </section>
            </div>

            <div class="right-column">
                <section class="card chart-card">
                    <h2 id="chartTitle">Gesamte Statistik der Augensummen</h2>
                    <div class="chart-wrapper">
                        <canvas id="wuerfelChart"></canvas>
                    </div>
                </section>
            </div>

            <section class="card info-card full-width">
                <h2>💡 Mathematischer Hintergrund & Verteilungsanalyse</h2>
                <div id="didaktikInhalt"></div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
